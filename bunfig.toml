# Bun configuration for Shikai
# https://bun.sh/docs/runtime/bunfig

[install]
# Save a text-based lockfile for better git diffs
saveTextLockfile = true

# Use hoisted installation strategy (npm-like)
linker = "hoisted"

# Configuration via environment variables - NO HARDCODED SECRETS
# BUN_REGISTRY - npm registry URL (default: https://registry.npmjs.org)
# BUN_TOKEN - authentication token for private registry
registry = "${BUN_REGISTRY:-https://registry.npmjs.org}"
token = "${BUN_TOKEN}"

[install.lockfile]
# Generate bun.lock file
save = true